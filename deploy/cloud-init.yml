#cloud-config
package_update: true
packages:
  - ca-certificates
  - curl
  - git
  - rsync
  - sqlite3
  - ufw
runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - sh -c "curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc"
  - chmod a+r /etc/apt/keyrings/docker.asc
  - sh -c "echo 'deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable' > /etc/apt/sources.list.d/docker.list"
  - apt-get update
  - sh -c "apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin || apt-get install -y docker.io docker-compose-v2"
  - mkdir -p /srv/mergework/data /srv/mergework/backups
  - chown -R 10001:10001 /srv/mergework/data
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
