services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mergework-data:/srv/mergework/data
    expose:
      - "8000"

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  backup:
    image: alpine:3.20
    restart: unless-stopped
    volumes:
      - mergework-data:/data:ro
      - ./backups:/backups
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache sqlite >/dev/null
        while true; do
          if [ -f /data/mergework.sqlite3 ]; then
            sqlite3 /data/mergework.sqlite3 ".backup '/backups/mergework-$$(date -u +%Y%m%dT%H%M%SZ).sqlite3'"
            find /backups -type f -name 'mergework-*.sqlite3' -mtime +14 -delete
          fi
          sleep 86400
        done

volumes:
  mergework-data:
  caddy-data:
  caddy-config:
