<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% if site_context == "ltc_lab" %}LTC Lab{% else %}MergeWork{% endif %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header>
      <a class="brand" href="/">{% if site_context == "ltc_lab" %}LTC Lab{% else %}MergeWork <span>MRWK</span>{% endif %}</a>
      <nav>
        {% if site_context == "ltc_lab" %}
        <a href="#projects">Projects</a>
        <a href="https://mrwk.ltclab.site">MRWK</a>
        <a href="https://github.com/ramimbo/mergework" rel="nofollow noopener">GitHub</a>
        {% else %}
        <a href="/bounties">Bounties</a>
        <a href="/activity">Activity</a>
        <a href="/ledger">Explorer</a>
        <a href="/wallets">Wallets</a>
        <a href="/transfer">Transfer</a>
        <a href="/me">Me</a>
        <a href="/docs">Docs</a>
        <a href="/api/v1/status">API</a>
        {% endif %}
      </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
